<div class="mist-app">

    <header class="mist-header">
        <div class="mist-brand">
            <div class="mist-mark">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2.5 16.5 L8.5 6 L12.5 12 L15.5 8 L21.5 16.5"></path>
                    <circle cx="15.5" cy="8" r="1.7" fill="currentColor" stroke="none"></circle>
                </svg>
            </div>
            <div class="mist-wordmark"><span class="j">HPE</span> <span class="m">Mist API</span></div>
        </div>
        <div class="mist-header-tag">{{ tabLabel }}</div>
    </header>

    <main class="mist-main">
        <app-api *ngIf="display=='api'"></app-api>
        <app-account *ngIf="display=='account'"></app-account>
        <app-tools *ngIf="display=='tools'"></app-tools>
        <app-about *ngIf="display=='about'"></app-about>
    </main>

    <nav class="mist-tabs">
        <button class="mist-tab" [class.active]="display=='api'" (click)="show('api')">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
            API
        </button>
        <button class="mist-tab" [class.active]="display=='account'" (click)="show('account')">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M4 21a8 8 0 0 1 16 0"></path>
            </svg>
            Accounts
        </button>
        <button class="mist-tab" [class.active]="display=='tools'" (click)="show('tools')">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18l3 3 6.3-6.3a4 4 0 0 0 5.4-5.4l-2.4 2.4-2.1-.5-.5-2.1z"></path>
            </svg>
            Tools
        </button>
        <button class="mist-tab" [class.active]="display=='about'" (click)="show('about')">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="9"></circle>
                <line x1="12" y1="11" x2="12" y2="16"></line>
                <circle cx="12" cy="7.6" r="0.6" fill="currentColor"></circle>
            </svg>
            About
        </button>
    </nav>

</div>
