<div class="mist-scrim" (click)="cancel()">
    <div class="mist-modal" (click)="$event.stopPropagation()">
        <div class="mist-modal-head">
            <span class="mist-modal-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                    <path d="M10 11v6M14 11v6"></path>
                </svg>
            </span>
            <div class="mist-modal-title">Delete API token</div>
        </div>
        <div class="mist-modal-body">Anything authenticating with this token will immediately lose access. This can't be
            undone.</div>
        <div class="mist-actions">
            <button class="mist-btn mist-btn-ghost" (click)="cancel()">Cancel</button>
            <button class="mist-btn mist-btn-danger" (click)="confirm()">Delete token</button>
        </div>
    </div>
</div>
