<div class="mist-scrim" (click)="close()" *ngIf="session">
  <div class="mist-modal" (click)="$event.stopPropagation()">
    <div class="mist-modal-head">
      <span class="mist-modal-icon accent">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="15" r="4"></circle>
          <path d="M10.8 12.2 21 2"></path>
          <path d="M18 5l3 3"></path>
          <path d="M15 8l3 3"></path>
        </svg>
      </span>
      <div class="mist-modal-title">{{ device_type | uppercase }} ZTP Password</div>
    </div>
    <div class="mist-note-text" style="margin: 8px 0 12px;">{{ device_type | uppercase }} ID · <span class="mono">{{ device_id }}</span></div>
    <textarea class="mist-key-box ztp-box" readonly rows="3" id="ztppassword" #ztppassword_input
      [ngStyle]="{'color': response_empty ? 'var(--c-warning)' : 'var(--c-text)'}">{{ ztp_password.root_password }}</textarea>
    <div class="mist-actions" style="margin-top: 14px;">
      <button class="mist-btn mist-btn-ghost" (click)="close()">Close</button>
      <button class="mist-btn mist-btn-primary" [disabled]="is_working || response_empty"
        (click)="copyPassword(ztppassword_input)">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="11" height="11" rx="2"></rect>
          <path d="M5 15V5a2 2 0 0 1 2-2h10"></path>
        </svg>
        Copy
      </button>
    </div>
  </div>
</div>
