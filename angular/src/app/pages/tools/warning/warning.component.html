<div class="mist-scrim" (click)="cancel()">
  <div class="mist-modal" (click)="$event.stopPropagation()">
    <div class="mist-modal-head">
      <span class="mist-modal-icon warn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 9v4"></path>
          <path d="M12 17h.01"></path>
          <path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"></path>
        </svg>
      </span>
      <div class="mist-modal-title">Warning</div>
    </div>
    <div class="mist-modal-body">
      <span class="exp" *ngIf="experimentalMessage">This is an experimental feature.</span>
      {{ warningMessage }} Do you want to continue?
    </div>
    <div class="mist-actions">
      <button class="mist-btn mist-btn-ghost" (click)="cancel()">Cancel</button>
      <button class="mist-btn mist-btn-primary" (click)="confirm()">Confirm</button>
    </div>
  </div>
</div>
